version: '3.8'

services:
    db:
        image: postgres:15-alpine
        container_name: todo_postgres
        environment:
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD: 5671
            POSTGRES_DB: TodoDb
        ports:
            - "5433:5432"

        volumes:
            - pgdata:/var/lib/postgresql/data

volumes:
    pgdata: